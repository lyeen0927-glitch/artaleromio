<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>階梯組隊</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #12121a;
  --surface: #1c1c28;
  --surface2: #25253a;
  --border: rgba(255,255,255,0.08);
  --text: #e8e8f0;
  --muted: #666680;
  --p1: #e74c3c;
  --p2: #27ae60;
  --p3: #2980b9;
  --p4: #9b59b6;
}
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}

/* ── LOBBY ── */
#lobby { width: 340px; max-width: 100%; }
.logo { text-align: center; margin-bottom: 28px; }
.logo h1 { font-size: 24px; font-weight: 700; }
.logo p { font-size: 13px; color: var(--muted); margin-top: 5px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px 20px;
  margin-bottom: 10px;
}
.card h2 {
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
}

.player-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;
}
.p-btn {
  padding: 16px 8px; border-radius: 10px;
  border: 2px solid transparent; background: var(--surface2);
  color: var(--text); font-size: 18px; font-weight: 700;
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.p-btn span { display: block; font-size: 11px; font-weight: 400; color: var(--muted); margin-top: 2px; }
.p-btn.p1 { border-color: var(--p1); } .p-btn.p1.active { background: var(--p1); color: #fff; }
.p-btn.p2 { border-color: var(--p2); } .p-btn.p2.active { background: var(--p2); color: #fff; }
.p-btn.p3 { border-color: var(--p3); } .p-btn.p3.active { background: var(--p3); color: #fff; }
.p-btn.p4 { border-color: var(--p4); } .p-btn.p4.active { background: var(--p4); color: #fff; }
.p-btn.p1:hover:not(.active) { background: rgba(231,76,60,0.2); }
.p-btn.p2:hover:not(.active) { background: rgba(39,174,96,0.2); }
.p-btn.p3:hover:not(.active) { background: rgba(41,128,185,0.2); }
.p-btn.p4:hover:not(.active) { background: rgba(155,89,182,0.2); }

.sel-hint { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 0; }

.row-input { display: flex; gap: 8px; }
input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 9px; color: var(--text); font-size: 16px; font-weight: 700;
  padding: 10px 14px; outline: none; letter-spacing: 2px; font-family: monospace;
}
input:focus { border-color: rgba(255,255,255,0.25); }
input::placeholder { letter-spacing: 0; font-weight: 400; font-size: 13px; font-family: 'Segoe UI', system-ui; }

.btn {
  padding: 10px 16px; border-radius: 9px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-main { background: #4f46e5; color: #fff; width: 100%; padding: 12px; font-size: 15px; margin-bottom: 10px; }
.btn-main:hover { background: #4338ca; }
.btn-sec { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-sec:hover { background: rgba(255,255,255,0.1); }

.divider {
  text-align: center; color: var(--muted); font-size: 11px; margin: 10px 0;
  position: relative;
}
.divider::before, .divider::after {
  content: ''; position: absolute; top: 50%; width: 36%;
  height: 1px; background: var(--border);
}
.divider::before { left: 0; } .divider::after { right: 0; }
.error { color: #f87171; font-size: 12px; margin-top: 7px; min-height: 16px; }

/* ── GAME ── */
#game { display: none; width: 100%; max-width: 360px; }

.g-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
.room-tag {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px;
  font-family: monospace; font-size: 15px; font-weight: 700; letter-spacing: 2px;
  cursor: pointer;
}
.live-dot {
  width: 7px; height: 7px; background: #4ade80; border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

.me-tag {
  padding: 5px 12px; border-radius: 8px;
  font-size: 13px; font-weight: 700; color: #fff;
}
.online-badge {
  margin-left: auto; font-size: 12px; color: var(--muted);
}
.btn-leave {
  background: none; border: 1px solid var(--border); border-radius: 7px;
  color: var(--muted); padding: 5px 10px; font-size: 12px; cursor: pointer;
}
.btn-leave:hover { color: var(--text); }

/* Legend */
.legend {
  display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
}
.leg-item {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface); border-radius: 6px;
  padding: 4px 9px; font-size: 12px; transition: opacity 0.3s;
}
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Main grid */
.stair-grid {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
}
.stair-row {
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border);
  padding: 7px 10px; gap: 8px;
  transition: background 0.2s;
}
.stair-row:last-child { border-bottom: none; }
.stair-row.done { background: rgba(74,222,128,0.06); }
.stair-row.bad  { background: rgba(248,113,113,0.07); }

.step-num {
  width: 26px; text-align: center;
  font-size: 13px; font-weight: 700; color: var(--muted);
  flex-shrink: 0;
}

.nums {
  display: flex; gap: 7px; flex: 1;
}

/* Each number button */
.num-btn {
  flex: 1; height: 42px; border-radius: 9px;
  border: 2px solid var(--border); background: var(--surface2);
  color: var(--muted); font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
/* Taken by someone else — show their color, not clickable feel */
.num-btn.taken {
  cursor: default; opacity: 0.9;
}
/* Taken by ME */
.num-btn.mine {
  cursor: pointer;
}
/* Hover only when free */
.num-btn.free:hover {
  border-color: rgba(255,255,255,0.3);
  color: var(--text);
  background: rgba(255,255,255,0.07);
}
/* Conflict ring */
.num-btn.conflict {
  box-shadow: 0 0 0 2px #f87171;
}

/* Status */
.status {
  display: flex; align-items: center; gap: 8px;
  margin-top: 10px; padding: 9px 13px;
  background: var(--surface); border-radius: 9px; font-size: 13px;
}
.s-dot { width: 7px; height: 7px; border-radius: 50%; }
.s-ok   { background: #4ade80; }
.s-warn { background: #facc15; }
.s-err  { background: #f87171; }

.done-banner {
  display: none; text-align: center; margin-top: 10px; padding: 13px;
  background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25);
  border-radius: 10px; font-weight: 600; font-size: 14px;
}

.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 18px; font-size: 13px;
  opacity: 0; pointer-events: none; transition: all 0.2s; z-index: 99;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">
    <h1>🪜 階梯組隊</h1>
    <p>選數字，顏色即時同步給所有人</p>
  </div>

  <div class="card">
    <h2>你是哪位玩家？</h2>
    <div class="player-grid">
      <button class="p-btn p1" onclick="pick(1)">P1<span>玩家一</span></button>
      <button class="p-btn p2" onclick="pick(2)">P2<span>玩家二</span></button>
      <button class="p-btn p3" onclick="pick(3)">P3<span>玩家三</span></button>
      <button class="p-btn p4" onclick="pick(4)">P4<span>玩家四</span></button>
    </div>
    <p class="sel-hint" id="sel-hint">尚未選擇</p>
  </div>

  <div class="card">
    <button class="btn btn-main" onclick="createRoom()">＋ 建立新房間</button>
    <div class="divider">或加入現有房間</div>
    <div class="row-input" style="margin-top:10px">
      <input id="code-in" placeholder="輸入房間代號" maxlength="8"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')joinRoom()">
      <button class="btn btn-sec" onclick="joinRoom()">進入</button>
    </div>
    <div class="error" id="err"></div>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="g-header">
    <div class="room-tag" onclick="copyCode()">
      <div class="live-dot"></div>
      <span id="g-code"></span>
    </div>
    <div class="me-tag" id="g-me"></div>
    <div class="online-badge"><span id="g-online">0</span> 人在線</div>
    <button class="btn-leave" onclick="leave()">離開</button>
  </div>

  <div class="legend" id="legend"></div>

  <div class="stair-grid" id="grid"></div>

  <div class="status" id="status">
    <div class="s-dot s-warn" id="s-dot"></div>
    <span id="s-txt">等待選擇…</span>
    <button class="btn btn-sec" onclick="resetAll()"
      style="margin-left:auto;font-size:11px;padding:3px 9px">重置</button>
  </div>
  <div class="done-banner" id="done-banner">🎉 全部完成，可以傳送了！</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, set, onValue, off, remove, onDisconnect, push, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db = getDatabase(initializeApp({
  apiKey: 'AIzaSyiABFW9OhgjY7bTtJ8Er2Wttpcev1CL0bDUBvf1ye',
  authDomain: 'playgood-e6be9.firebaseapp.com',
  databaseURL: 'https://playgood-e6be9-default-rtdb.firebaseio.com',
  projectId: 'playgood-e6be9',
}));

const STEPS = 10;
const COLORS = ['','#e74c3c','#27ae60','#2980b9','#9b59b6'];
const PNAME  = ['','P1','P2','P3','P4'];

let me = 0, room = null, presRef = null, dataRef = null, presListRef = null;
// state[step][num] = player (1-4) or 0
let state = mkState();
function mkState() {
  return Array.from({length: STEPS+1}, () => ({1:0,2:0,3:0,4:0}));
}

// ── Lobby ─────────────────────────────────────────────────────────────────────
window.pick = function(p) {
  me = p;
  document.querySelectorAll('.p-btn').forEach((b,i) => b.classList.toggle('active', i===p-1));
  document.getElementById('sel-hint').textContent = `已選擇 P${p}`;
  document.getElementById('err').textContent = '';
};

window.createRoom = function() {
  if (!chk()) return;
  document.getElementById('code-in').value = Math.floor(100000+Math.random()*900000)+'';
  joinRoom();
};
window.joinRoom = function() {
  if (!chk()) return;
  const c = document.getElementById('code-in').value.trim();
  if (!c) { setErr('請輸入房間代號'); return; }
  setErr(''); go(c);
};
function chk() { if (!me) { setErr('請先選擇玩家身份'); return false; } return true; }
function setErr(m) { document.getElementById('err').textContent = m; }

// ── Enter Room ────────────────────────────────────────────────────────────────
function go(code) {
  room = code;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('g-code').textContent = code;
  const mt = document.getElementById('g-me');
  mt.textContent = PNAME[me];
  mt.style.background = COLORS[me];

  buildGrid();

  // Sync data
  dataRef = ref(db, `r/${code}/d`);
  onValue(dataRef, snap => {
    state = mkState();
    const v = snap.val();
    if (v) {
      for (let s = 1; s <= STEPS; s++) {
        if (v[s]) for (let n = 1; n <= 4; n++)
          state[s][n] = v[s][n] || 0;
      }
    }
    render();
  });

  // Presence
  presListRef = ref(db, `r/${code}/p`);
  presRef = push(presListRef);
  set(presRef, { p: me, t: serverTimestamp() });
  onDisconnect(presRef).remove();
  onValue(presListRef, snap => {
    const online = new Set();
    if (snap.exists()) Object.values(snap.val()).forEach(v => online.add(v.p));
    document.getElementById('g-online').textContent = online.size;
    renderLegend(online);
  });
}

// ── Build grid (once) ─────────────────────────────────────────────────────────
function buildGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  for (let s = STEPS; s >= 1; s--) {
    const row = document.createElement('div');
    row.className = 'stair-row';
    row.id = `r${s}`;

    const lbl = document.createElement('div');
    lbl.className = 'step-num';
    lbl.textContent = s;
    row.appendChild(lbl);

    const nums = document.createElement('div');
    nums.className = 'nums';
    for (let n = 1; n <= 4; n++) {
      const btn = document.createElement('button');
      btn.className = 'num-btn free';
      btn.textContent = n;
      btn.id = `b${s}-${n}`;
      btn.onclick = () => tap(s, n);
      nums.appendChild(btn);
    }
    row.appendChild(nums);
    g.appendChild(row);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  let done = 0, bad = 0;

  for (let s = 1; s <= STEPS; s++) {
    const st = state[s]; // {1:player,2:player,...}
    // Check conflicts: same player picked two numbers in same row
    const playerNums = {}; // player -> [nums]
    let filled = 0;
    for (let n = 1; n <= 4; n++) {
      if (st[n]) {
        filled++;
        if (!playerNums[st[n]]) playerNums[st[n]] = [];
        playerNums[st[n]].push(n);
      }
    }
    // A conflict = one player has 2 numbers in same row
    const hasConflict = Object.values(playerNums).some(arr => arr.length > 1);
    const allFilled = filled === 4;
    const complete = allFilled && !hasConflict;
    if (hasConflict) bad++;
    if (complete) done++;

    // Conflicted nums for this row
    const conflictNums = new Set();
    Object.values(playerNums).forEach(arr => { if (arr.length > 1) arr.forEach(n => conflictNums.add(n)); });

    const row = document.getElementById(`r${s}`);
    row.className = 'stair-row' + (complete ? ' done' : hasConflict ? ' bad' : '');

    for (let n = 1; n <= 4; n++) {
      const btn = document.getElementById(`b${s}-${n}`);
      const owner = st[n];
      const isMine = owner === me;
      const isTaken = owner && !isMine;
      const isFree = !owner;
      const isConflict = conflictNums.has(n);

      btn.className = 'num-btn' +
        (isFree   ? ' free'  : '') +
        (isMine   ? ' mine'  : '') +
        (isTaken  ? ' taken' : '') +
        (isConflict ? ' conflict' : '');

      if (owner) {
        btn.style.background = COLORS[owner];
        btn.style.borderColor = COLORS[owner];
        btn.style.color = '#fff';
      } else {
        btn.style.background = '';
        btn.style.borderColor = '';
        btn.style.color = '';
      }
    }
  }
  updateStatus(done, bad);
}

// ── Tap a number button ───────────────────────────────────────────────────────
function tap(step, num) {
  const owner = state[step][num];
  if (owner && owner !== me) return; // taken by someone else

  const newVal = (owner === me) ? 0 : me; // toggle
  state[step][num] = newVal;
  render();

  const path = ref(db, `r/${room}/d/${step}/${num}`);
  newVal ? set(path, newVal) : remove(path);
}

// ── Status ────────────────────────────────────────────────────────────────────
function updateStatus(done, bad) {
  const dot = document.getElementById('s-dot');
  const txt = document.getElementById('s-txt');
  const banner = document.getElementById('done-banner');
  if (done === STEPS) {
    dot.className = 's-dot s-ok'; txt.textContent = '全部 10 層完成！';
    banner.style.display = 'block';
  } else if (bad) {
    dot.className = 's-dot s-err'; txt.textContent = `${bad} 層有衝突`;
    banner.style.display = 'none';
  } else {
    dot.className = 's-dot s-warn'; txt.textContent = `已完成 ${done} / ${STEPS} 層`;
    banner.style.display = 'none';
  }
}

// ── Legend ────────────────────────────────────────────────────────────────────
function renderLegend(online) {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  for (let p = 1; p <= 4; p++) {
    const el = document.createElement('div');
    el.className = 'leg-item';
    el.style.opacity = online.has(p) ? '1' : '0.3';
    el.innerHTML = `<div class="leg-dot" style="background:${COLORS[p]}"></div>P${p}`;
    leg.appendChild(el);
  }
}

window.resetAll = function() {
  if (!confirm('確定清除全部？')) return;
  remove(ref(db, `r/${room}/d`));
};
window.leave = function() {
  if (dataRef) { off(dataRef); dataRef = null; }
  if (presListRef) { off(presListRef); presListRef = null; }
  if (presRef) { remove(presRef); presRef = null; }
  room = null; state = mkState();
  document.getElementById('game').style.display = 'none';
  document.getElementById('lobby').style.display = 'block';
};
window.copyCode = function() {
  navigator.clipboard.writeText(room).then(() => toast(`${room} 已複製`));
};
function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
</script>
</body>
</html>
