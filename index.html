<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羅密歐與茱麗葉</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #12121a; --surface: #1c1c28; --surface2: #25253a;
  --border: rgba(255,255,255,0.08); --text: #e8e8f0; --muted: #666680;
  --p1: #e74c3c; --p2: #27ae60; --p3: #2980b9; --p4: #9b59b6;
}
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px;
}

/* LOBBY */
#lobby { width: 340px; max-width: 100%; }
.logo { text-align: center; margin-bottom: 28px; }
.logo h1 { font-size: 24px; font-weight: 700; }
.logo p { font-size: 13px; color: var(--muted); margin-top: 5px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px 20px; margin-bottom: 10px; }
.card h2 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

.player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.p-btn {
  padding: 12px 8px; border-radius: 10px; border: 2px solid transparent;
  background: var(--surface2); color: var(--text); cursor: pointer; transition: all 0.15s; text-align: center;
}
.p-btn .p-num { font-size: 18px; font-weight: 700; display: block; }
.p-btn .p-name { font-size: 12px; color: var(--muted); display: block; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-btn.p1 { border-color: var(--p1); } .p-btn.p1.active { background: var(--p1); color: #fff; }
.p-btn.p2 { border-color: var(--p2); } .p-btn.p2.active { background: var(--p2); color: #fff; }
.p-btn.p3 { border-color: var(--p3); } .p-btn.p3.active { background: var(--p3); color: #fff; }
.p-btn.p4 { border-color: var(--p4); } .p-btn.p4.active { background: var(--p4); color: #fff; }
.p-btn.p1:hover:not(.active) { background: rgba(231,76,60,0.2); }
.p-btn.p2:hover:not(.active) { background: rgba(39,174,96,0.2); }
.p-btn.p3:hover:not(.active) { background: rgba(41,128,185,0.2); }
.p-btn.p4:hover:not(.active) { background: rgba(155,89,182,0.2); }
.p-btn.active .p-name { color: rgba(255,255,255,0.75); }

.sel-hint { text-align: center; font-size: 12px; color: var(--muted); }
.row-input { display: flex; gap: 8px; }
input[type="text"] {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 9px; color: var(--text); font-size: 15px; font-weight: 600;
  padding: 10px 14px; outline: none; letter-spacing: 1px; font-family: monospace;
}
input[type="text"]:focus { border-color: rgba(255,255,255,0.25); }
input[type="text"]::placeholder { letter-spacing: 0; font-weight: 400; font-size: 13px; font-family: 'Segoe UI', system-ui; }

.btn { padding: 10px 16px; border-radius: 9px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn:active { transform: scale(0.97); }
.btn-main { background: #4f46e5; color: #fff; width: 100%; padding: 12px; font-size: 15px; margin-bottom: 10px; }
.btn-main:hover { background: #4338ca; }
.btn-sec { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-sec:hover { background: rgba(255,255,255,0.1); }
.divider { text-align: center; color: var(--muted); font-size: 11px; margin: 10px 0; position: relative; }
.divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 36%; height: 1px; background: var(--border); }
.divider::before { left: 0; } .divider::after { right: 0; }
.error { color: #f87171; font-size: 12px; margin-top: 7px; min-height: 16px; }

/* GAME */
#game { display: none; width: 100%; max-width: 360px; }
.g-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.room-tag {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 12px; font-family: monospace; font-size: 15px; font-weight: 700;
  letter-spacing: 2px; cursor: pointer;
}
.live-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.me-tag { padding: 5px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; color: #fff; cursor: pointer; }
.me-tag:hover { opacity: 0.85; }
.online-badge { margin-left: auto; font-size: 12px; color: var(--muted); }
.btn-leave { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--muted); padding: 5px 10px; font-size: 12px; cursor: pointer; }
.btn-leave:hover { color: var(--text); }

.legend { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: 5px; background: var(--surface); border-radius: 6px; padding: 4px 9px; font-size: 12px; transition: opacity 0.3s; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.stair-grid { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.stair-row { display: flex; align-items: center; border-bottom: 1px solid var(--border); padding: 7px 10px; gap: 8px; transition: background 0.2s; }
.stair-row:last-child { border-bottom: none; }
.stair-row.done { background: rgba(74,222,128,0.06); }
.stair-row.bad  { background: rgba(248,113,113,0.07); }
.step-num { width: 26px; text-align: center; font-size: 13px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
.nums { display: flex; gap: 7px; flex: 1; }
.num-btn {
  flex: 1; height: 42px; border-radius: 9px; border: 2px solid var(--border);
  background: var(--surface2); color: var(--muted); font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.num-btn.taken { cursor: default; opacity: 0.9; }
.num-btn.free:hover { border-color: rgba(255,255,255,0.3); color: var(--text); background: rgba(255,255,255,0.07); }
.num-btn.conflict { box-shadow: 0 0 0 2px #f87171; }

.status { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 9px 13px; background: var(--surface); border-radius: 9px; font-size: 13px; }
.s-dot { width: 7px; height: 7px; border-radius: 50%; }
.s-ok { background: #4ade80; } .s-warn { background: #facc15; } .s-err { background: #f87171; }
.done-banner { display: none; text-align: center; margin-top: 10px; padding: 13px; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); border-radius: 10px; font-weight: 600; font-size: 14px; }

/* MODAL */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(3px);
  align-items: center; justify-content: center; z-index: 200; padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px 24px; width: 300px; max-width: 100%;
  animation: pop 0.15s ease;
}
@keyframes pop { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
.modal-btns { display: flex; gap: 8px; }
.modal-btns .btn { flex: 1; padding: 11px; font-size: 14px; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-danger:hover { background: #c0392b; }

/* Name edit modal */
.name-input-wrap { margin-bottom: 20px; }
.name-input-wrap input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 9px; color: var(--text); font-size: 15px; padding: 10px 14px;
  outline: none; letter-spacing: 0; font-weight: 400; font-family: 'Segoe UI', system-ui;
}
.name-input-wrap input:focus { border-color: rgba(255,255,255,0.3); }

.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 18px; font-size: 13px;
  opacity: 0; pointer-events: none; transition: all 0.2s; z-index: 99;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">
    <h1>🪜 羅密歐與茱麗葉</h1>
    <p>選數字，顏色即時同步給所有人</p>
  </div>
  <div class="card">
    <h2>選擇你的玩家身份</h2>
    <div class="player-grid" id="player-grid">
      <button class="p-btn p1" onclick="pick(1)"><span class="p-num">P1</span></button>
      <button class="p-btn p2" onclick="pick(2)"><span class="p-num">P2</span></button>
      <button class="p-btn p3" onclick="pick(3)"><span class="p-num">P3</span></button>
      <button class="p-btn p4" onclick="pick(4)"><span class="p-num">P4</span></button>
    </div>
    <p class="sel-hint" id="sel-hint">尚未選擇</p>
  </div>
  <div class="card">
    <button class="btn btn-main" onclick="createRoom()">＋ 建立新房間</button>
    <div class="divider">或加入現有房間</div>
    <div class="row-input" style="margin-top:10px">
      <input type="text" id="code-in" placeholder="輸入房間代號" maxlength="8"
        oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')joinRoom()">
      <button class="btn btn-sec" onclick="joinRoom()">進入</button>
    </div>
    <div class="error" id="err"></div>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="g-header">
    <div class="room-tag" onclick="copyCode()">
      <div class="live-dot"></div>
      <span id="g-code"></span>
    </div>
    <div class="me-tag" id="g-me" onclick="openNameModal()" title="點擊修改名稱"></div>
    <div class="online-badge"><span id="g-online">0</span> 人在線</div>
    <button class="btn-leave" onclick="leave()">離開</button>
  </div>
  <div class="legend" id="legend"></div>
  <div class="stair-grid" id="grid"></div>
  <div class="status" id="status">
    <div class="s-dot s-warn" id="s-dot"></div>
    <span id="s-txt">等待選擇…</span>
    <button class="btn btn-sec" onclick="resetAll()" style="margin-left:auto;font-size:11px;padding:3px 9px">重置</button>
  </div>
  <div class="done-banner" id="done-banner">🎉 全部完成，可以傳送了！</div>
</div>

<!-- 確認換數字 Modal -->
<div class="modal-bg" id="confirm-modal">
  <div class="modal">
    <h3>確認變更？</h3>
    <p id="confirm-msg"></p>
    <div class="modal-btns">
      <button class="btn btn-sec" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" id="confirm-ok">確認變更</button>
    </div>
  </div>
</div>

<!-- 編輯名稱 Modal -->
<div class="modal-bg" id="name-modal">
  <div class="modal">
    <h3>✏️ 修改名稱</h3>
    <p>為你的玩家設定一個名稱，其他人也會看到。</p>
    <div class="name-input-wrap">
      <input type="text" id="name-input" maxlength="12" placeholder="輸入名稱（最多12字）">
    </div>
    <div class="modal-btns">
      <button class="btn btn-sec" onclick="closeNameModal()">取消</button>
      <button class="btn btn-main" style="margin-bottom:0" onclick="saveName()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, set, onValue, off, remove, onDisconnect, push, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db = getDatabase(initializeApp({
  apiKey: 'AIzaSyiABFW9OhgjY7bTtJ8Er2Wttpcev1CL0bDUBvf1ye',
  authDomain: 'playgood-e6be9.firebaseapp.com',
  databaseURL: 'https://playgood-e6be9-default-rtdb.firebaseio.com',
  projectId: 'playgood-e6be9',
}));

const STEPS = 10;
const COLORS = ['','#e74c3c','#27ae60','#2980b9','#9b59b6'];
const DEFAULT_NAMES = ['','玩家一','玩家二','玩家三','玩家四'];

let me = 0, room = null, presRef = null, dataRef = null, presListRef = null, namesRef = null;
let state = mkState();
let playerNames = ['', ...DEFAULT_NAMES.slice(1)]; // index 1-4

function mkState() {
  return Array.from({length: STEPS+1}, () => ({1:0,2:0,3:0,4:0}));
}

// ── Name helpers ──────────────────────────────────────────────────────────────
function myName() { return playerNames[me] || `P${me}`; }

function updateLobbyNames() {
  // Names are only shown inside the room, not in lobby
}

// ── Lobby ─────────────────────────────────────────────────────────────────────
window.pick = function(p) {
  me = p;
  document.querySelectorAll('.p-btn').forEach((b,i) => b.classList.toggle('active', i===p-1));
  document.getElementById('sel-hint').textContent = `已選擇 P${p}（${playerNames[p]}）`;
  document.getElementById('err').textContent = '';
};

window.createRoom = function() {
  if (!chk()) return;
  document.getElementById('code-in').value = Math.floor(100000+Math.random()*900000)+'';
  joinRoom();
};
window.joinRoom = function() {
  if (!chk()) return;
  const c = document.getElementById('code-in').value.trim();
  if (!c) { setErr('請輸入房間代號'); return; }
  setErr(''); go(c);
};
function chk() { if (!me) { setErr('請先選擇玩家身份'); return false; } return true; }
function setErr(m) { document.getElementById('err').textContent = m; }

// ── Enter Room ────────────────────────────────────────────────────────────────
function go(code) {
  room = code;
  // Reset names for this room session (avoid bleed from previous room)
  playerNames = ['', ...DEFAULT_NAMES.slice(1)];
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('g-code').textContent = code;
  updateMeTag();
  buildGrid();

  // Sync grid data
  dataRef = ref(db, `r/${code}/d`);
  onValue(dataRef, snap => {
    state = mkState();
    const v = snap.val();
    if (v) for (let s = 1; s <= STEPS; s++)
      if (v[s]) for (let n = 1; n <= 4; n++) state[s][n] = v[s][n] || 0;
    render();
  });

  // Sync names
  namesRef = ref(db, `r/${code}/names`);
  onValue(namesRef, snap => {
    const v = snap.val();
    if (v) for (let p = 1; p <= 4; p++) if (v[p]) playerNames[p] = v[p];
    updateLobbyNames();
    renderLegend(null); // refresh legend names
  });

  // Presence
  presListRef = ref(db, `r/${code}/p`);
  presRef = push(presListRef);
  set(presRef, { p: me, t: serverTimestamp() });
  onDisconnect(presRef).remove();
  onValue(presListRef, snap => {
    const online = new Set();
    if (snap.exists()) Object.values(snap.val()).forEach(v => online.add(v.p));
    document.getElementById('g-online').textContent = online.size;
    renderLegend(online);
  });

  // Write my name to Firebase so others see it
  set(ref(db, `r/${code}/names/${me}`), playerNames[me]);
}

function updateMeTag() {
  const mt = document.getElementById('g-me');
  mt.textContent = `✏️ ${myName()}`;
  mt.style.background = COLORS[me];
}

// ── Name Modal ────────────────────────────────────────────────────────────────
window.openNameModal = function() {
  document.getElementById('name-input').value = playerNames[me] || '';
  document.getElementById('name-modal').classList.add('show');
  setTimeout(() => document.getElementById('name-input').focus(), 50);
};
window.closeNameModal = function() {
  document.getElementById('name-modal').classList.remove('show');
};
window.saveName = function() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) return;
  playerNames[me] = val;
  updateMeTag();
  updateLobbyNames();
  if (room) set(ref(db, `r/${room}/names/${me}`), val);
  closeNameModal();
  toast(`名稱已更新為「${val}」`);
};
document.getElementById('name-modal').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveName();
  if (e.key === 'Escape') closeNameModal();
});

// ── Build grid ────────────────────────────────────────────────────────────────
function buildGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  for (let s = STEPS; s >= 1; s--) {
    const row = document.createElement('div');
    row.className = 'stair-row'; row.id = `r${s}`;
    const lbl = document.createElement('div');
    lbl.className = 'step-num'; lbl.textContent = s;
    row.appendChild(lbl);
    const nums = document.createElement('div');
    nums.className = 'nums';
    for (let n = 1; n <= 4; n++) {
      const btn = document.createElement('button');
      btn.className = 'num-btn free'; btn.textContent = n; btn.id = `b${s}-${n}`;
      btn.onclick = () => tap(s, n);
      nums.appendChild(btn);
    }
    row.appendChild(nums);
    g.appendChild(row);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  let done = 0, bad = 0;
  for (let s = 1; s <= STEPS; s++) {
    const st = state[s];
    const playerNums = {};
    let filled = 0;
    for (let n = 1; n <= 4; n++) {
      if (st[n]) { filled++; (playerNums[st[n]] = playerNums[st[n]] || []).push(n); }
    }
    const hasConflict = Object.values(playerNums).some(a => a.length > 1);
    const complete = filled === 4 && !hasConflict;
    if (hasConflict) bad++;
    if (complete) done++;
    const conflictNums = new Set();
    Object.values(playerNums).forEach(a => { if (a.length > 1) a.forEach(n => conflictNums.add(n)); });

    document.getElementById(`r${s}`).className = 'stair-row' + (complete ? ' done' : hasConflict ? ' bad' : '');

    for (let n = 1; n <= 4; n++) {
      const btn = document.getElementById(`b${s}-${n}`);
      const owner = st[n];
      btn.className = 'num-btn' +
        (!owner ? ' free' : owner === me ? ' mine' : ' taken') +
        (conflictNums.has(n) ? ' conflict' : '');
      if (owner) {
        btn.style.background = COLORS[owner];
        btn.style.borderColor = COLORS[owner];
        btn.style.color = '#fff';
      } else {
        btn.style.background = btn.style.borderColor = btn.style.color = '';
      }
    }
  }
  updateStatus(done, bad);
}

// ── Tap with confirm ──────────────────────────────────────────────────────────
function tap(step, num) {
  const owner = state[step][num];
  if (owner && owner !== me) return; // other player's

  const myPrevKey = Object.keys(state[step]).find(n => Number(n) !== num && state[step][n] === me);

  if (owner === me) {
    // Deselect own pick — no confirm needed
    doSet(step, num, 0, myPrevKey ? null : null);
  } else if (myPrevKey) {
    // Already have a pick in this row → ask for confirm
    showConfirm(
      `第 ${step} 層：將「${myPrevKey}」改為「${num}」？`,
      () => doSet(step, num, me, myPrevKey)
    );
  } else {
    // Fresh pick — no confirm needed
    doSet(step, num, me, null);
  }
}

function doSet(step, newNum, newVal, clearNum) {
  if (clearNum) {
    state[step][clearNum] = 0;
    remove(ref(db, `r/${room}/d/${step}/${clearNum}`));
  }
  state[step][newNum] = newVal;
  render();
  newVal ? set(ref(db, `r/${room}/d/${step}/${newNum}`), newVal)
         : remove(ref(db, `r/${room}/d/${step}/${newNum}`));
}

// ── Confirm Modal ─────────────────────────────────────────────────────────────
let confirmCb = null;
function showConfirm(msg, cb) {
  confirmCb = cb;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-modal').classList.add('show');
}
window.closeConfirm = function() {
  document.getElementById('confirm-modal').classList.remove('show');
  confirmCb = null;
};
document.getElementById('confirm-ok').onclick = function() {
  if (confirmCb) confirmCb();
  closeConfirm();
};
document.getElementById('confirm-modal').addEventListener('keydown', e => {
  if (e.key === 'Escape') closeConfirm();
});

// ── Status & Legend ───────────────────────────────────────────────────────────
function updateStatus(done, bad) {
  const dot = document.getElementById('s-dot');
  const txt = document.getElementById('s-txt');
  const banner = document.getElementById('done-banner');
  if (done === STEPS) {
    dot.className = 's-dot s-ok'; txt.textContent = '全部 10 層完成！'; banner.style.display = 'block';
  } else if (bad) {
    dot.className = 's-dot s-err'; txt.textContent = `${bad} 層有衝突`; banner.style.display = 'none';
  } else {
    dot.className = 's-dot s-warn'; txt.textContent = `已完成 ${done} / ${STEPS} 層`; banner.style.display = 'none';
  }
}

function renderLegend(online) {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  for (let p = 1; p <= 4; p++) {
    const el = document.createElement('div');
    el.className = 'leg-item';
    el.style.opacity = (!online || online.has(p)) ? '1' : '0.3';
    el.innerHTML = `<div class="leg-dot" style="background:${COLORS[p]}"></div>
      <span>${playerNames[p] || DEFAULT_NAMES[p]}</span>`;
    leg.appendChild(el);
  }
}

// ── Misc ──────────────────────────────────────────────────────────────────────
window.resetAll = function() {
  if (!confirm('確定清除全部選擇？')) return;
  remove(ref(db, `r/${room}/d`));
};
window.leave = function() {
  if (dataRef) { off(dataRef); dataRef = null; }
  if (namesRef) { off(namesRef); namesRef = null; }
  if (presListRef) { off(presListRef); presListRef = null; }
  if (presRef) { remove(presRef); presRef = null; }
  room = null; state = mkState();
  document.getElementById('game').style.display = 'none';
  document.getElementById('lobby').style.display = 'block';
};
window.copyCode = function() {
  navigator.clipboard.writeText(room).then(() => toast(`${room} 已複製`));
};
function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
</script>
</body>
</html>
