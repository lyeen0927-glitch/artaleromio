<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>階梯組隊協作</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --text: #e0e0e0;
  --muted: #888;
  --radius: 10px;
  --p1: #e74c3c;
  --p2: #27ae60;
  --p3: #2980b9;
  --p4: #8e44ad;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* ── LOBBY ── */
#lobby { width: 360px; max-width: 100%; }

.logo { text-align: center; margin-bottom: 32px; }
.logo h1 { font-size: 26px; font-weight: 700; }
.logo p { font-size: 13px; color: var(--muted); margin-top: 6px; }

.card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px;
  padding: 28px 24px;
  margin-bottom: 12px;
}
.card h2 {
  font-size: 12px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;
}

.player-selector {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px;
}
.player-btn {
  padding: 14px 8px; border-radius: var(--radius);
  border: 2px solid transparent; background: var(--surface2);
  color: var(--text); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.player-btn .p-num { font-size: 22px; font-weight: 700; }
.player-btn.p1 { border-color: var(--p1); }
.player-btn.p2 { border-color: var(--p2); }
.player-btn.p3 { border-color: var(--p3); }
.player-btn.p4 { border-color: var(--p4); }
.player-btn.p1:hover, .player-btn.p1.selected { background: var(--p1); }
.player-btn.p2:hover, .player-btn.p2.selected { background: var(--p2); }
.player-btn.p3:hover, .player-btn.p3.selected { background: var(--p3); }
.player-btn.p4:hover, .player-btn.p4.selected { background: var(--p4); }

.room-input-row { display: flex; gap: 8px; margin-bottom: 8px; }

input[type="text"] {
  flex: 1; background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius);
  color: var(--text); font-size: 15px; padding: 11px 14px; outline: none;
  letter-spacing: 2px; font-family: monospace; font-weight: 600;
}
input[type="text"]:focus { border-color: rgba(255,255,255,0.3); }
input[type="text"]::placeholder { letter-spacing: 0; font-weight: 400; font-family: 'Segoe UI', system-ui; }

.btn {
  padding: 11px 18px; border-radius: var(--radius); border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: #4f46e5; color: #fff; width: 100%; padding: 13px; font-size: 15px; }
.btn-primary:hover { background: #4338ca; }
.btn-sm { background: rgba(255,255,255,0.1); color: var(--text); }
.btn-sm:hover { background: rgba(255,255,255,0.18); }

.divider {
  text-align: center; color: var(--muted); font-size: 12px;
  margin: 12px 0; position: relative;
}
.divider::before, .divider::after {
  content: ''; position: absolute; top: 50%; width: 38%;
  height: 1px; background: rgba(255,255,255,0.08);
}
.divider::before { left: 0; } .divider::after { right: 0; }

.error { color: #f87171; font-size: 13px; margin-top: 8px; min-height: 18px; }

/* ── GAME ── */
#game { display: none; width: 100%; max-width: 520px; }

.game-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.room-badge {
  background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 6px 14px;
  font-family: monospace; font-size: 16px; font-weight: 700;
  letter-spacing: 2px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
}
.online-dot {
  width: 8px; height: 8px; background: #4ade80; border-radius: 50%;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

.my-player-badge { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; }
.online-info { margin-left: auto; font-size: 12px; color: var(--muted); }
.btn-leave {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
  color: var(--muted); padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
}
.btn-leave:hover { color: var(--text); }

.legend { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.legend-item {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border-radius: 6px; padding: 5px 10px; font-size: 13px;
}
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

.grid-wrapper {
  background: var(--surface); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px; overflow: hidden;
}
.grid-header {
  display: grid; grid-template-columns: 44px repeat(4, 1fr);
  background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.08);
}
.grid-header-cell {
  padding: 10px 6px; text-align: center;
  font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
}
.grid-header-cell.p1c { color: var(--p1); }
.grid-header-cell.p2c { color: var(--p2); }
.grid-header-cell.p3c { color: var(--p3); }
.grid-header-cell.p4c { color: var(--p4); }

.grid-row {
  display: grid; grid-template-columns: 44px repeat(4, 1fr);
  border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;
}
.grid-row:last-child { border-bottom: none; }
.grid-row.completed { background: rgba(74,222,128,0.07); }
.grid-row.conflict  { background: rgba(248,113,113,0.09); }

.step-label {
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: var(--muted);
  border-right: 1px solid rgba(255,255,255,0.05);
}

.cell {
  display: flex; align-items: center; justify-content: center;
  padding: 6px 4px; position: relative;
}

.picker { display: flex; gap: 3px; }
.pick-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1.5px solid rgba(255,255,255,0.12); background: var(--surface2);
  color: var(--muted); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.12s;
  display: flex; align-items: center; justify-content: center;
}
.pick-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
.pick-btn.sel-p1 { background: var(--p1); border-color: var(--p1); color: #fff; }
.pick-btn.sel-p2 { background: var(--p2); border-color: var(--p2); color: #fff; }
.pick-btn.sel-p3 { background: var(--p3); border-color: var(--p3); color: #fff; }
.pick-btn.sel-p4 { background: var(--p4); border-color: var(--p4); color: #fff; }
.pick-btn.conflict-btn { outline: 2px solid #f87171; outline-offset: 1px; }

.other-cell {
  width: 32px; height: 32px; border-radius: 8px;
  font-size: 15px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.05); color: var(--muted);
}
.other-cell.has-val { color: #fff; }
.other-cell.conflict-cell { outline: 2px solid #f87171; outline-offset: 1px; }

.status-bar {
  display: flex; align-items: center; gap: 10px;
  margin-top: 12px; padding: 10px 14px;
  background: var(--surface); border-radius: 10px;
  font-size: 13px; flex-wrap: wrap;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; }
.s-ok   { background: #4ade80; }
.s-warn { background: #facc15; }
.s-err  { background: #f87171; }

.complete-banner {
  text-align: center; padding: 14px;
  background: linear-gradient(135deg, rgba(74,222,128,0.15), rgba(59,130,246,0.15));
  border: 1px solid rgba(74,222,128,0.3); border-radius: 10px;
  margin-top: 12px; font-weight: 600; font-size: 15px; display: none;
}

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: #1e293b; border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 10px 20px; font-size: 13px;
  opacity: 0; pointer-events: none; transition: all 0.2s; z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">
    <h1>🪜 階梯組隊</h1>
    <p>四人即時協作，避免數字重複</p>
  </div>

  <div class="card">
    <h2>選擇你的玩家身份</h2>
    <div class="player-selector">
      <button class="player-btn p1" onclick="selectPlayer(1)">
        <span class="p-num">P1</span><span>玩家 1</span>
      </button>
      <button class="player-btn p2" onclick="selectPlayer(2)">
        <span class="p-num">P2</span><span>玩家 2</span>
      </button>
      <button class="player-btn p3" onclick="selectPlayer(3)">
        <span class="p-num">P3</span><span>玩家 3</span>
      </button>
      <button class="player-btn p4" onclick="selectPlayer(4)">
        <span class="p-num">P4</span><span>玩家 4</span>
      </button>
    </div>
    <div id="sel-label" style="text-align:center;font-size:13px;color:var(--muted)">尚未選擇</div>
  </div>

  <div class="card">
    <h2>加入房間</h2>
    <button class="btn btn-primary" onclick="createRoom()" style="margin-bottom:12px">＋ 建立新房間</button>
    <div class="divider">或加入現有房間</div>
    <div class="room-input-row" style="margin-top:12px">
      <input type="text" id="room-input" placeholder="輸入房間代號"
        maxlength="8" oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')joinRoom()">
      <button class="btn btn-sm" onclick="joinRoom()">進入</button>
    </div>
    <div class="error" id="error-msg"></div>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="game-header">
    <div class="room-badge" onclick="copyCode()" title="點擊複製">
      <div class="online-dot"></div>
      <span id="hdr-code">------</span>
    </div>
    <div class="my-player-badge" id="hdr-player"></div>
    <div class="online-info"><span id="hdr-online">0</span> 人在線</div>
    <button class="btn-leave" onclick="leaveRoom()">離開</button>
  </div>

  <div class="legend" id="legend"></div>

  <div class="grid-wrapper">
    <div class="grid-header">
      <div class="grid-header-cell" style="color:var(--muted)">層</div>
      <div class="grid-header-cell p1c">P1</div>
      <div class="grid-header-cell p2c">P2</div>
      <div class="grid-header-cell p3c">P3</div>
      <div class="grid-header-cell p4c">P4</div>
    </div>
    <div id="grid-body"></div>
  </div>

  <div class="status-bar" id="status-bar">
    <div class="status-dot s-warn" id="status-dot"></div>
    <span id="status-text">等待玩家選擇數字…</span>
    <button class="btn btn-sm" onclick="resetAll()"
      style="margin-left:auto;font-size:12px;padding:4px 10px">🔄 重置</button>
  </div>
  <div class="complete-banner" id="complete-banner">🎉 全部 10 層完成，準備傳送！</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, set, onValue, off, remove, onDisconnect, push, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: 'AIzaSyiABFW9OhgjY7bTtJ8Er2Wttpcev1CL0bDUBvf1ye',
  authDomain: 'playgood-e6be9.firebaseapp.com',
  databaseURL: 'https://playgood-e6be9-default-rtdb.firebaseio.com',
  projectId: 'playgood-e6be9',
});
const db = getDatabase(app);

const STEPS = 10, PLAYERS = 4;
const COLORS = ['','#e74c3c','#27ae60','#2980b9','#8e44ad'];

let myPlayer = 0, roomCode = null;
let presenceRef = null, dataRef = null, presencesRef = null;
// gridData[step 1-10][player 1-4] = number 1-4 or 0
let gridData = makeEmpty();

function makeEmpty() {
  return Array.from({length: STEPS+1}, () => [0,0,0,0,0]);
}

// ── Lobby ─────────────────────────────────────────────────────────────────────
window.selectPlayer = function(p) {
  myPlayer = p;
  document.querySelectorAll('.player-btn').forEach((b,i) =>
    b.classList.toggle('selected', i === p-1));
  document.getElementById('sel-label').textContent = `已選擇：玩家 ${p}`;
  document.getElementById('error-msg').textContent = '';
};

window.createRoom = function() {
  if (!checkP()) return;
  document.getElementById('room-input').value =
    Math.floor(100000 + Math.random()*900000).toString();
  joinRoom();
};

window.joinRoom = function() {
  if (!checkP()) return;
  const code = document.getElementById('room-input').value.trim();
  if (!code) { setErr('請輸入房間代號'); return; }
  setErr('');
  enterRoom(code);
};

function checkP() {
  if (!myPlayer) { setErr('請先選擇玩家身份'); return false; }
  return true;
}
function setErr(m) { document.getElementById('error-msg').textContent = m; }

// ── Room ──────────────────────────────────────────────────────────────────────
function enterRoom(code) {
  roomCode = code;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('hdr-code').textContent = code;
  const pb = document.getElementById('hdr-player');
  pb.textContent = 'P' + myPlayer;
  pb.style.cssText = `background:${COLORS[myPlayer]};color:#fff`;

  buildGrid();

  // Data sync
  dataRef = ref(db, `rooms/${code}/grid`);
  onValue(dataRef, snap => {
    gridData = makeEmpty();
    const val = snap.val();
    if (val) {
      for (let s = 1; s <= STEPS; s++) {
        if (val[s]) for (let p = 1; p <= PLAYERS; p++)
          gridData[s][p] = val[s][p] || 0;
      }
    }
    renderGrid();
  });

  // Presence
  presencesRef = ref(db, `rooms/${code}/presence`);
  presenceRef = push(presencesRef);
  set(presenceRef, { player: myPlayer, t: serverTimestamp() });
  onDisconnect(presenceRef).remove();
  onValue(presencesRef, snap => {
    const count = snap.exists() ? Object.keys(snap.val()).length : 0;
    document.getElementById('hdr-online').textContent = count;
    updateLegend(snap.val());
  });
}

// ── Grid ──────────────────────────────────────────────────────────────────────
function buildGrid() {
  const body = document.getElementById('grid-body');
  body.innerHTML = '';
  for (let s = STEPS; s >= 1; s--) {
    const row = document.createElement('div');
    row.className = 'grid-row';
    row.id = `row-${s}`;
    const lbl = document.createElement('div');
    lbl.className = 'step-label';
    lbl.textContent = s;
    row.appendChild(lbl);
    for (let p = 1; p <= PLAYERS; p++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${s}-${p}`;
      row.appendChild(cell);
    }
    body.appendChild(row);
  }
}

function renderGrid() {
  let done = 0, conflicts = 0;

  for (let s = 1; s <= STEPS; s++) {
    const picks = gridData[s];
    const count = {};
    let filled = 0;
    for (let p = 1; p <= PLAYERS; p++) {
      if (picks[p]) { filled++; count[picks[p]] = (count[picks[p]]||0)+1; }
    }
    const hasConflict = Object.values(count).some(v => v > 1);
    const complete = filled === PLAYERS && !hasConflict;
    if (hasConflict) conflicts++;
    if (complete) done++;

    const row = document.getElementById(`row-${s}`);
    row.className = 'grid-row' + (complete ? ' completed' : hasConflict ? ' conflict' : '');

    for (let p = 1; p <= PLAYERS; p++) {
      const cell = document.getElementById(`cell-${s}-${p}`);
      cell.innerHTML = '';
      const val = picks[p];
      const isConflict = val && count[val] > 1;

      if (p === myPlayer) {
        const picker = document.createElement('div');
        picker.className = 'picker';
        for (let n = 1; n <= 4; n++) {
          const btn = document.createElement('button');
          btn.className = 'pick-btn';
          btn.textContent = n;
          if (val === n) {
            btn.classList.add(`sel-p${p}`);
            if (isConflict) btn.classList.add('conflict-btn');
          }
          const step = s, num = n;
          btn.onclick = () => pickNumber(step, p, val === num ? 0 : num);
          picker.appendChild(btn);
        }
        cell.appendChild(picker);
      } else {
        const d = document.createElement('div');
        d.className = 'other-cell' + (val ? ' has-val' : '') + (isConflict ? ' conflict-cell' : '');
        d.style.background = val ? COLORS[p] : '';
        d.textContent = val || '?';
        cell.appendChild(d);
      }
    }
  }
  updateStatus(done, conflicts);
}

function pickNumber(step, player, num) {
  gridData[step][player] = num;
  renderGrid();
  const path = ref(db, `rooms/${roomCode}/grid/${step}/${player}`);
  num ? set(path, num) : remove(path);
}

function updateStatus(done, conflicts) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  const banner = document.getElementById('complete-banner');
  if (done === STEPS) {
    dot.className = 'status-dot s-ok';
    txt.textContent = `全部 ${STEPS} 層完成，無衝突！`;
    banner.style.display = 'block';
  } else if (conflicts > 0) {
    dot.className = 'status-dot s-err';
    txt.textContent = `${conflicts} 層有數字衝突，請修正`;
    banner.style.display = 'none';
  } else {
    dot.className = 'status-dot s-warn';
    txt.textContent = `已完成 ${done} / ${STEPS} 層`;
    banner.style.display = 'none';
  }
}

function updateLegend(data) {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  const online = new Set();
  if (data) Object.values(data).forEach(v => online.add(v.player));
  for (let p = 1; p <= PLAYERS; p++) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.style.opacity = online.has(p) ? '1' : '0.3';
    item.innerHTML = `<div class="legend-dot" style="background:${COLORS[p]}"></div>
      P${p} <span style="font-size:10px">${online.has(p)?'● 在線':'○ 離線'}</span>`;
    legend.appendChild(item);
  }
}

window.resetAll = function() {
  if (!confirm('確定清除所有選擇？')) return;
  remove(ref(db, `rooms/${roomCode}/grid`));
};

window.leaveRoom = function() {
  if (dataRef) { off(dataRef); dataRef = null; }
  if (presencesRef) { off(presencesRef); presencesRef = null; }
  if (presenceRef) { remove(presenceRef); presenceRef = null; }
  roomCode = null; gridData = makeEmpty();
  document.getElementById('game').style.display = 'none';
  document.getElementById('lobby').style.display = 'block';
};

window.copyCode = function() {
  navigator.clipboard.writeText(roomCode)
    .then(() => toast(`代號 ${roomCode} 已複製`));
};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
